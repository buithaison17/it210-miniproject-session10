<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách thiết bị</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<!-- Nội dung -->
<div class="container">
    <h2 class="mb-3 text-primary">Danh sách thiết bị</h2>

    <div class="mb-3">
        <a th:href="@{/admin/device/add}" class="btn btn-success">
            + Thêm thiết bị mới
        </a>
    </div>

    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-dark">
        <tr>
            <th scope="col">ID</th>
            <th scope="col">Tên thiết bị</th>
            <th scope="col">Số lượng</th>
            <th scope="col">Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="device : ${devices}">
            <td th:text="${device.id}"></td>
            <td th:text="${device.name}"></td>
            <td th:text="${device.quantityAvailable}"></td>
            <td>
                <a th:href="@{/admin/device/edit/{id}(id=${device.id})}"
                   class="btn btn-sm btn-warning">Sửa</a>
                <a th:href="@{/admin/device/delete/{id}(id=${device.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
