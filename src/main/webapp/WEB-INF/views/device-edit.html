<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa thiết bị</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">


<div class="container">
    <h2 class="mb-3 text-warning">Sửa thiết bị</h2>

    <!-- Form sửa -->
    <form th:action="@{/admin/device/edit/{id}(id=${device.id})}"
          th:object="${device}" method="post" class="card p-4 shadow-sm">

        <div class="mb-3">
            <label for="name" class="form-label">Tên thiết bị</label>
            <input type="text" th:field="*{name}" id="name" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label for="quantityAvailable" class="form-label">Số lượng</label>
            <input type="number" th:field="*{quantityAvailable}" id="quantityAvailable" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('quantityAvailable')}" th:errors="*{quantityAvailable}"></div>
        </div>

        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-warning">Cập nhật</button>
            <a th:href="@{/admin/device}" class="btn btn-secondary">Quay lại</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
