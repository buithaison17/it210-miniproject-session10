<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Them thiet bi</title>
</head>
<body>
<div layout:fragment="content">
    <div class="mt-4">
        <h2 class="mb-3 text-primary">Them thiet bi</h2>

        <form th:action="@{/admin/device/add}" th:object="${device}" method="post" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label for="name" class="form-label">Ten thiet bi</label>
                <input type="text" th:field="*{name}" id="name" class="form-control" placeholder="Nhap ten thiet bi">
                <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label for="quantityAvailable" class="form-label">So luong</label>
                <input type="number" th:field="*{quantityAvailable}" id="quantityAvailable" class="form-control" placeholder="Nhap so luong">
                <div class="text-danger" th:if="${#fields.hasErrors('quantityAvailable')}" th:errors="*{quantityAvailable}"></div>
            </div>

            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-success">Luu</button>
                <a th:href="@{/admin/device}" class="btn btn-secondary">Quay lai</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
