<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm thiết bị</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">


<!-- Nội dung -->
<div class="container">
    <h2 class="mb-3 text-primary" th:text="${device.id} != null ? 'Sửa thiết bị' : 'Thêm thiết bị'"></h2>

    <form th:action="@{${device.id} != null ? '/admin/device/edit/' + ${device.id} : '/admin/device/add'}" th:object="${device}" method="post" class="card p-4 shadow-sm">
        <div class="mb-3">
            <label for="name" class="form-label">Tên thiết bị</label>
            <input type="text" th:field="*{name}" id="name" class="form-control" placeholder="Nhập tên thiết bị">
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label for="quantityAvailable" class="form-label">Số lượng</label>
            <input type="number" th:field="*{quantityAvailable}" id="quantityAvailable" class="form-control" placeholder="Nhập số lượng">
            <div class="text-danger" th:if="${#fields.hasErrors('quantityAvailable')}" th:errors="*{quantityAvailable}"></div>
        </div>

        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-success">Lưu</button>
            <a th:href="@{/admin/device}" class="btn btn-secondary">Quay lại</a>
        </div>
    </form>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
